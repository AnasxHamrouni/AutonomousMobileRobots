global_costmap:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    update_frequency: 1.0
    static_map: True

local_costmap:
  ros__parameters:
    use_sim_time: True
    global_frame: odom
    robot_base_frame: base_link
    update_frequency: 5.0
    rolling_window: True

controller_server:
  ros__parameters:
    use_sim_time: True

planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

bt_navigator:
  ros__parameters:
    use_sim_time: True
    default_bt_xml_filename: "path/to/nav2_behavior_tree.xml"

behavior_server:
  ros__parameters:
    use_sim_time: True
    behaviors:
      - name: "spin"
        type: "nav2_behaviors/Spin"
      - name: "backup"
        type: "nav2_behaviors/BackUp"
      - name: "wait"
        type: "nav2_behaviors/Wait"

    Spin:
      enabled: True
      time_allowance: 10.0

    BackUp:
      enabled: True
      time_allowance: 10.0
      backup_distance: -0.2
      backup_speed: 0.05

    Wait:
      enabled: True
      time_allowance: 10.0

recovery_server:
  ros__parameters:
    use_sim_time: True
    cycle_recovery_enabled: True
    recovery_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_recoveries/Spin"

    backup:
      plugin: "nav2_recoveries/BackUp"

    wait:
      plugin: "nav2_recoveries/Wait"

